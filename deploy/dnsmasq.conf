# =============================================================================
# dnsmasq.conf — PXE Deployer staging DHCP + TFTP server
#
# Tune the values marked with ← to match your staging network.
# Then restart: docker compose restart pxe-dnsmasq
# =============================================================================

# ── Interface ────────────────────────────────────────────────────────────────
# Listen only on the staging NIC (not the management/uplink interface).
# Replace "eth1" with your staging network interface name.
interface=eth1                      # ← staging NIC
bind-interfaces

# ── DNS (minimal — forwards to upstream) ─────────────────────────────────────
domain-needed
bogus-priv
no-resolv
server=8.8.8.8

# ── DHCP ─────────────────────────────────────────────────────────────────────
# Hand out IPs in the staging range.
dhcp-range=192.168.10.100,192.168.10.200,12h   # ← adjust range + subnet
dhcp-option=option:router,192.168.10.1         # ← staging gateway
dhcp-option=option:dns-server,8.8.8.8

# Lease file
dhcp-leasefile=/tmp/dnsmasq.leases

# ── TFTP ─────────────────────────────────────────────────────────────────────
enable-tftp
tftp-root=/srv/pxe/tftp
tftp-no-fail

# ── PXE boot for UEFI x86_64 (client-arch 7 or 9) ───────────────────────────
dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9
dhcp-boot=tag:efi-x86_64,grubnetx64.efi

# ── Logging (to stdout so Docker logs work) ───────────────────────────────────
log-queries
log-dhcp
log-facility=-
