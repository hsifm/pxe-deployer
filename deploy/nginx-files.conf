# nginx config for pxe-files container
# Serves kernel images, initrds, and installer configs from /srv/pxe/http/

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex on;          # useful for debugging image directories

    # Allow large files (ISO images etc.)
    client_max_body_size 0;

    # Aggressive caching for kernel images (immutable content)
    location ~* \.(vmlinuz|initrd|img|iso)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Installer configs must never be cached — they change per-deployment
    location /configs/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
