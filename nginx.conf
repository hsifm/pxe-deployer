server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;

    # ── PWA: Service Worker — must never be cached ─────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    # PWA workbox runtime file — same treatment
    location ~* workbox.*\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # PWA manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";
        types { application/manifest+json webmanifest; }
    }

    # ── Static assets — immutable, long cache (Vite uses content hashes) ───────
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SVG icons
    location ~* \.svg$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── index.html — short cache so deploys refresh quickly ───────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # ── SPA fallback — all routes → index.html ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health endpoint (used by Docker HEALTHCHECK and load balancers) ────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
